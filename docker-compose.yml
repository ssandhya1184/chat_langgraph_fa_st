version: "3.9"

services:

  api:
    build:
      context: .
      dockerfile: Dockerfile.api

    container_name: langgraph-api

    ports:
      - "8000:8000"

    env_file:
      - .env

    volumes:
      - ./db:/app/db

    restart: unless-stopped


  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui

    container_name: langgraph-ui

    ports:
      - "8501:8501"

    env_file:
      - .env

    environment:
      API_URL: http://api:8000

    depends_on:
      - api

    restart: unless-stopped